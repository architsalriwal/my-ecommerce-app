{% load static %}

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <meta name="description" content="Django E-commerce Website" />
    <meta name="author" content="Your Name" />

    <title>{% block title %}Home | Django Ecommerce Site{% endblock %}</title>

    <!-- Favicon -->
    <link
      rel="shortcut icon"
      type="image/x-icon"
      href="{% static 'images/favicon.ico' %}"
    />

    <!-- Bootstrap CSS -->
    <link
      href="{% static 'css/bootstrap.css' %}"
      rel="stylesheet"
      type="text/css"
    />

    <!-- Font Awesome -->
    <link
      href="{% static 'fonts/fontawesome/css/all.min.css' %}"
      type="text/css"
      rel="stylesheet"
    />

    <!-- Custom Styles -->
    <link href="{% static 'css/ui.css' %}" rel="stylesheet" type="text/css" />
    <link
      href="{% static 'css/responsive.css' %}"
      rel="stylesheet"
      type="text/css"
    />
    <link
      href="{% static 'css/footer.css' %}"
      rel="stylesheet"
      type="text/css"
    />
    <link
      href="{% static 'css/register.css' %}"
      rel="stylesheet"
      type="text/css"
    />
    <link
      href="{% static 'css/contact.css' %}"
      rel="stylesheet"
      type="text/css"
    />

    <!-- External CSS Libraries -->
    <link
      href="https://unpkg.com/boxicons@2.1.2/css/boxicons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://cdn.lineicons.com/3.0/lineicons.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
    />

    <!-- jQuery and JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="{% static 'js/script.js' %}" type="text/javascript"></script>

    <!-- Custom Styles -->
    <style>
      @property --angle {
        syntax: "<angle>";
        initial-value: 0deg;
        inherits: false;
      }

      .card-body::after,
      .card-body::before {
        content: "";
        position: absolute;
        height: 100%;
        width: 100%;
        background-image: conic-gradient(
          from var(--angle),
          #ff4545,
          #00ff99,
          #006aff,
          #ff0095,
          #ff4545
        );
        top: 50%;
        left: 50%;
        translate: -50% -50%;
        z-index: -1;
        padding: 3px;
        border-radius: 10px;
        animation: 3s spin linear infinite;
      }

      .card-body::before {
        filter: blur(1.5rem);
        opacity: 0.5;
      }

      @keyframes spin {
        from {
          --angle: 0deg;
        }
        to {
          --angle: 360deg;
        }
      }

      /* Header Banner Styles */
      .header-banner {
        background-color: #f8f9fa;
        padding: 8px 0;
        border-bottom: 1px solid #e9ecef;
      }

      .header-promotion {
        color: #333;
        font-weight: 500;
      }

      /* Responsive Adjustments */
      @media (max-width: 768px) {
        .header-banner {
          padding: 5px 0;
        }

        .header-promotion {
          font-size: 14px;
        }
      }

      /* Additional Custom Styles */
      .slide-up {
        transition: all 0.3s ease;
      }

      .slide-up.hidden {
        transform: translateY(-100%);
      }

      /* Custom Container Max-Width */
      .container-xl {
        max-width: 1400px;
      }
    </style>
  </head>

  <body>
    <!-- Header Banner -->
    <div class="header-banner slide-up" aria-hidden="false">
      <div class="container">
        <div class="d-flex justify-content-center">
          <div class="html-slot-container">
            <input type="hidden" id="endTime" value="null" />
            <div class="content">
              <marquee
                direction="left"
                width="100%"
                scrollamount="10"
                onmouseover="this.stop();"
                onmouseout="this.start();"
              >
                <span class="header-promotion marquee-span">
                  Use Code NEW10 and get 10% OFF* on non-discounted Shoes over
                  Rs. 4499. Maximum Discount: Rs. 1200. T&amp;C Apply.
                </span>
              </marquee>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Navigation -->
    {% include 'home/navbar.html' %}

    <!-- Main Content -->
    <main>{% block start %} {% endblock %}</main>

    <!-- Footer -->
    {% include 'home/footer.html' %}

    <!-- Custom JavaScript -->
    <script>
      // Hide header banner on scroll down
      let lastScroll = 0;
      const headerBanner = document.querySelector(".header-banner");

      window.addEventListener("scroll", () => {
        const currentScroll = window.pageYOffset;

        if (currentScroll > lastScroll && currentScroll > 100) {
          headerBanner.classList.add("hidden");
        } else {
          headerBanner.classList.remove("hidden");
        }

        lastScroll = currentScroll;
      });

      // Initialize Bootstrap tooltips
      $(function () {
        $('[data-toggle="tooltip"]').tooltip();
      });
    </script>
  </body>
</html>
